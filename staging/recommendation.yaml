apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-recommendation
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Phuc-215/yas.git
    targetRevision: HEAD
    path: k8s/charts/recommendation
    helm:
      valueFiles:
        - ../../overlays/staging/recommendation.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
