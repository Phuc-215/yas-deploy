apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-payment-paypal
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/Phuc-215/yas.git
      targetRevision: main
      path: k8s/charts/payment-paypal
      helm:
        valueFiles:
          - $values/overlays/staging/payment-paypal.yaml
    - repoURL: https://github.com/Phuc-215/yas-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
